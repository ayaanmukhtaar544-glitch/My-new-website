<!DOCTYPE html>
<html>
<head>
    <title>My Web App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            text-align: center;
            padding: 20px;
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .box {
            background: white;
            color: black;
            padding: 20px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        /* ===== CALCULATOR ===== */
        #display {
            width: 100%;
            height: 50px;
            font-size: 22px;
            text-align: right;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            height: 45px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #f2f2f2;
        }

        button:hover {
            background: #ddd;
        }

        .equal {
            background: green;
            color: white;
        }

        .clear {
            background: red;
            color: white;
        }

        /* ===== TODO ===== */
        input {
            padding: 10px;
            width: 80%;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f2f2f2;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .del {
            background: red;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>My Web App</h1>

<div class="container">

<!-- 🧮 CALCULATOR -->
<div class="box">
    <h2>Calculator</h2>

    <input id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('-')">-</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('*')">*</button>
        <button onclick="append('/')">/</button>
        <button class="equal" onclick="calc()">=</button>
    </div>
</div>

<!-- 📝 TODO LIST -->
<div class="box">
    <h2>To-Do List</h2>

    <input id="task" placeholder="Write task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>
</div>

</div>

<script>
/* ===== CALCULATOR ===== */
let display = document.getElementById("display");

function append(v) {
    display.value += v;
}

function clearDisplay() {
    display.value = "";
}

function calc() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}

/* ===== TODO LIST ===== */
function addTask() {
    let task = document.getElementById("task");

    if (task.value === "") return;

    let li = document.createElement("li");
    li.innerHTML = task.value + ' <button class="del" onclick="this.parentElement.remove()">X</button>';

    document.getElementById("list").appendChild(li);

    task.value = "";
}
</script>

</body>
</html>
